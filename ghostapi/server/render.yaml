services:
  - type: web
    name: ghostapi
    runtime: docker
    repo: https://github.com/MrGhostGuy/stax-agent
    branch: master
    rootDir: ghostapi/server
    plan: free
    envVars:
      - key: GHOSTAPI_PORT
        value: "3000"
      - key: GHOSTAPI_SECRET
        generateValue: true
      - key: NODE_ENV
        value: "production"
      - key: OPENROUTER_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
