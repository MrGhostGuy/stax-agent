name: Deploy NiceGuyAPI

on:
  push:
    branches: [master]
    paths:
      - 'ghostapi/server/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ghostapi/server
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ghostapi/server/package-lock.json
      
      - name: Install dependencies
        run: npm ci --only=production
      
      - name: Run syntax check
        run: node -c index.js
      
      - name: Deploy to Render
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Triggering Render deploy..."
            curl -s -X POST "$RENDER_DEPLOY_HOOK_URL"
            echo "Deploy triggered!"
          else
            echo "No RENDER_DEPLOY_HOOK_URL configured — skipping deploy"
            echo "To enable: add RENDER_DEPLOY_HOOK secret to GitHub repo settings"
          fi
